  <rect x="58" y="2"  width="22" height="22" rx="4" fill="none" stroke="#0B3D2E" stroke-width="5" opacity="0.5"/>
  <rect x="2"  y="30" width="22" height="22" rx="4" fill="none" stroke="#0B3D2E" stroke-width="5" opacity="0.5"/>
